<div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
  <h1>Taguig City Visitor Kiosk</h1>
  <p>Please place your ID on the scanner and click the button below.</p>

  <button (click)="onScanClick()" style="padding: 20px 40px; font-size: 20px; cursor: pointer; background-color: #d32f2f; color: white; border: none; border-radius: 10px;">
    {{ loading ? 'Reading ID...' : 'TAP TO SCAN ID' }}
  </button>

  <hr style="margin: 40px 0;">

  <div *ngIf="visitorData" style="border: 2px solid #333; padding: 20px; display: inline-block; text-align: left; background: #f9f9f9;">
    <h3>Visitor Confirmation</h3>
    <p><strong>Control #:</strong> {{ visitorData.control_no }}</p>
    <p><strong>Name:</strong> {{ visitorData.full_name }}</p>
    <p><strong>ID Type:</strong> {{ visitorData.id_type }}</p>
    <p><strong>Address:</strong> {{ visitorData.address }}</p>
    <p><strong>Time In:</strong> {{ visitorData.time_in }}</p>

    <button style="background-color: #2e7d32; color: white; padding: 10px; width: 100%;">PROCEED TO PURPOSE OF VISIT</button>
  </div>
</div>
